apiVersion: apps/v1
kind: Deployment
metadata:
  name: rps-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rps-app
  template:
    metadata:
      labels:
        app: rps-app
    spec:
      containers:
      - name: rps-app
        image: 126692178135.dkr.ecr.ap-south-1.amazonaws.com/rps-app:v2
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: rps-service
spec:
  type: LoadBalancer
  selector:
    app: rps-app
  ports:
  - port: 80
    targetPort: 80
